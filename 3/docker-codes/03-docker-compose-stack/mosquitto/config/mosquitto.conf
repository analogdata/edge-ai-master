# Mosquitto MQTT Broker Configuration
# Analog Data — EdgeAI Engineering Bootcamp (Part 6)
#
# This file configures the Eclipse Mosquitto MQTT broker.
# It is mounted into the container at /mosquitto/config/mosquitto.conf
# via the volumes section in docker-compose.yml.

# Listen on all network interfaces on port 1883
# This is the standard MQTT protocol port
listener 1883 0.0.0.0

# Allow anonymous connections (for development/demo purposes)
# In production, set this to false and configure authentication
allow_anonymous true

# Enable WebSocket support on port 9001 (optional)
# This allows web-based clients to connect to the MQTT broker
listener 9001 0.0.0.0
protocol websockets

# Persistence — save messages to disk so they survive restarts
persistence true
persistence_location /mosquitto/data/

# Log to file
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information
